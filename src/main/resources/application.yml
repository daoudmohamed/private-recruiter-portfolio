spring:
  application:
    name: mutuelle-rag-agent

  # Spring AI Configuration
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: claude-sonnet-4-20250514
          max-tokens: 4096
          temperature: 0.7

    # OpenAI for embeddings only
    openai:
      api-key: ${OPENAI_API_KEY}
      embedding:
        options:
          model: text-embedding-3-small

    vectorstore:
      qdrant:
        host: ${QDRANT_HOST:localhost}
        port: ${QDRANT_GRPC_PORT:6334}
        api-key: ${QDRANT_API_KEY:}
        collection-name: mutuelle-knowledge
        initialize-schema: true

  # R2DBC Database Configuration
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mutuelle}
    username: ${DB_USER:mutuelle}
    password: ${DB_PASSWORD:mutuelle}
    pool:
      initial-size: 5
      max-size: 20
      max-idle-time: 30m

  # Flyway Database Migrations (uses JDBC)
  flyway:
    enabled: true
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mutuelle}
    user: ${DB_USER:mutuelle}
    password: ${DB_PASSWORD:mutuelle}
    locations: classpath:db/migration
    baseline-on-migrate: true
    schemas: mutuelle

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 10s
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4

  # RabbitMQ Configuration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /

  # Security - OAuth2 Resource Server
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:https://auth.mutuelle.fr}

  # Jackson JSON Configuration
  jackson:
    default-property-inclusion: non_null

# Server Configuration
server:
  port: 8080
  shutdown: graceful

  # Compression
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain,text/event-stream

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  health:
    redis:
      enabled: true
    rabbit:
      enabled: true
    db:
      enabled: true

# OpenAPI Documentation
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# Custom Application Properties
mutuelle:
  chat:
    max-history-messages: 20
    session-timeout-hours: 24
    streaming:
      chunk-size: 100
  rate-limit:
    requests-per-minute: 100
    timeout-seconds: 5
  escalation:
    confidence-threshold: 0.3
    queue-name: escalation.queue
  rag:
    similarity-threshold: 0.65
    top-k: 5

# Logging Configuration
logging:
  level:
    root: INFO
    com.mutuelle: DEBUG
    org.springframework.ai: DEBUG
    org.springframework.r2dbc: DEBUG
    io.r2dbc.postgresql: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
