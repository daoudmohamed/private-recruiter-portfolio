spring:
  application:
    name: knowledge-base

  # Spring AI - LLM Configuration
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: claude-sonnet-4-20250514
          max-tokens: 4096
          temperature: 0.7

    # OpenAI for embeddings only
    openai:
      api-key: ${OPENAI_API_KEY}
      embedding:
        options:
          model: text-embedding-3-small

    vectorstore:
      qdrant:
        host: ${QDRANT_HOST:localhost}
        port: ${QDRANT_GRPC_PORT:6334}
        api-key: ${QDRANT_API_KEY:}
        collection-name: knowledge-base
        initialize-schema: true

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 10s
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4

  # Jackson JSON Configuration
  jackson:
    default-property-inclusion: non_null

  # Disable autoconfiguration for removed components
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.r2dbc.R2dbcAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
      - org.springframework.boot.autoconfigure.data.r2dbc.R2dbcDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.r2dbc.R2dbcRepositoriesAutoConfiguration

# Server Configuration
server:
  port: 8080
  shutdown: graceful

  # Compression
  compression:
    enabled: true
    mime-types: application/json,text/html,text/plain,text/event-stream

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    redis:
      enabled: true

# OpenAPI Documentation
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# Custom Application Properties
knowledgebase:
  security:
    api-key: ${API_KEY:}
  chat:
    max-history-messages: 20
    session-timeout-hours: 24
  rag:
    similarity-threshold: 0.0
    top-k: 5
  documents:
    folder: ${DOCUMENTS_FOLDER:documents/}
    scan-on-startup: true

# Logging Configuration
logging:
  level:
    root: INFO
    com.knowledgebase: DEBUG
    org.springframework.ai: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
