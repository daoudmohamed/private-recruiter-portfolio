spring:
  application:
    name: knowledge-base

  # Spring AI - LLM Configuration
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-5-nano
      embedding:
        options:
          model: text-embedding-3-small

    vectorstore:
      qdrant:
        host: ${QDRANT_HOST:localhost}
        port: ${QDRANT_GRPC_PORT:6334}
        api-key: ${QDRANT_API_KEY:}
        collection-name: knowledge-base
        initialize-schema: true

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 10s
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4

  # Jackson JSON Configuration
  jackson:
    default-property-inclusion: non_null
  codec:
    max-in-memory-size: 16MB

  # Disable autoconfiguration for removed components
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.r2dbc.R2dbcAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
      - org.springframework.boot.autoconfigure.data.r2dbc.R2dbcDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.r2dbc.R2dbcRepositoriesAutoConfiguration

# Server Configuration
server:
  port: 8080
  shutdown: graceful

  # Compression
  compression:
    enabled: true
    mime-types: application/json,text/html,text/plain,text/event-stream

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    redis:
      enabled: true

# OpenAPI Documentation
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# Custom Application Properties
knowledgebase:
  security:
    api-key: ${API_KEY:}
    admin-api-key: ${ADMIN_API_KEY:${API_KEY:}}
    public-paths:
      - /actuator/health/**
      - /actuator/info
      - /api-docs/**
      - /swagger-ui/**
      - /swagger-ui.html
      - /webjars/**
      - /api/v1/recruiter-access/request-invitation
      - /api/v1/recruiter-access/consume
      - /api/v1/recruiter-access/session
      - /api/v1/recruiter-access/logout
    admin-paths:
      - /api/v1/recruiter-access/invitations
    cors:
      allowed-origins:
        - ${FRONTEND_ORIGIN:http://localhost:5173}
        - http://localhost:5174
        - http://localhost:4173
        - http://localhost:3000
        - http://127.0.0.1:5173
        - http://127.0.0.1:5174
        - http://127.0.0.1:4173
      allowed-methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      allowed-headers:
        - "*"
      allow-credentials: true
      max-age-seconds: 3600
  recruiter-access:
    enabled: false
    request-invitation-enabled: false
    invitation-ttl-hours: 24
    session-ttl-hours: 24
    cookie-name: kb_recruiter_session
    secure-cookies: false
    frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
    token-secret: ${RECRUITER_ACCESS_TOKEN_SECRET:}
    captcha:
      provider: ${RECRUITER_ACCESS_CAPTCHA_PROVIDER:NONE}
      site-key: ${RECRUITER_ACCESS_CAPTCHA_SITE_KEY:}
      verify-enabled: ${RECRUITER_ACCESS_CAPTCHA_VERIFY_ENABLED:true}
      recaptcha:
        secret-key: ${RECRUITER_ACCESS_CAPTCHA_RECAPTCHA_SECRET_KEY:}
        verify-url: ${RECRUITER_ACCESS_CAPTCHA_RECAPTCHA_VERIFY_URL:https://www.google.com/recaptcha/api/siteverify}
    rate-limit:
      max-requests-per-ip: 5
      max-requests-per-email: 3
      window-minutes: 60
    email:
      provider: ${RECRUITER_ACCESS_EMAIL_PROVIDER:LOG}
      from-email: ${RECRUITER_ACCESS_FROM_EMAIL:}
      from-name: ${RECRUITER_ACCESS_FROM_NAME:Knowledge Base}
      subject: ${RECRUITER_ACCESS_EMAIL_SUBJECT:Votre acces recruteur}
      brevo:
        api-key: ${BREVO_API_KEY:}
        template-id: ${BREVO_TEMPLATE_ID:}
        reply-to: ${RECRUITER_ACCESS_REPLY_TO:}
  chat:
    max-history-messages: 20
    session-timeout-hours: 24
  rag:
    similarity-threshold: 0.0
    top-k: 5
  documents:
    folder: ${DOCUMENTS_FOLDER:documents/}
    scan-on-startup: true

# Logging Configuration
logging:
  level:
    root: INFO
    com.knowledgebase: DEBUG
    org.springframework.ai: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
