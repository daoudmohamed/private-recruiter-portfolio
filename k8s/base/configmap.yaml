apiVersion: v1
kind: ConfigMap
metadata:
  name: mutuelle-config
  labels:
    app: mutuelle-rag-agent
data:
  # Redis
  redis-host: "redis-service"
  redis-port: "6379"

  # Qdrant
  qdrant-host: "qdrant-service"
  qdrant-port: "6334"

  # Frontend integration
  frontend-base-url: "https://portfolio.example.com"
  frontend-origin: "https://portfolio.example.com"

  # Recruiter-access email settings
  recruiter-access-from-name: "Knowledge Base"
  recruiter-access-from-email: "noreply@example.com"
  recruiter-access-reply-to: "contact@example.com"
  recruiter-access-email-subject: "Votre acces recruteur"
  brevo-template-id: "1"

  # Captcha
  recruiter-access-captcha-provider: "RECAPTCHA"
  recruiter-access-captcha-site-key: ""

  # Documents
  documents-folder: "/app/documents"
