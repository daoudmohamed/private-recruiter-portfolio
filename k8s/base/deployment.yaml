apiVersion: apps/v1
kind: Deployment
metadata:
  name: mutuelle-rag-agent
  labels:
    app: mutuelle-rag-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mutuelle-rag-agent
  template:
    metadata:
      labels:
        app: mutuelle-rag-agent
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: mutuelle-rag-agent
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: mutuelle-rag-agent
          image: mutuelle-rag-agent:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mutuelle-secrets
                  key: anthropic-api-key
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: mutuelle-config
                  key: db-host
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: mutuelle-config
                  key: db-port
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: mutuelle-config
                  key: db-name
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: mutuelle-secrets
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mutuelle-secrets
                  key: db-password
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: mutuelle-config
                  key: redis-host
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: mutuelle-config
                  key: redis-port
            - name: QDRANT_HOST
              valueFrom:
                configMapKeyRef:
                  name: mutuelle-config
                  key: qdrant-host
            - name: QDRANT_GRPC_PORT
              valueFrom:
                configMapKeyRef:
                  name: mutuelle-config
                  key: qdrant-port
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: mutuelle-config
                  key: rabbitmq-host
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: mutuelle-secrets
                  key: rabbitmq-user
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mutuelle-secrets
                  key: rabbitmq-password
            - name: JWT_ISSUER_URI
              valueFrom:
                configMapKeyRef:
                  name: mutuelle-config
                  key: jwt-issuer-uri
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - mutuelle-rag-agent
                topologyKey: kubernetes.io/hostname
