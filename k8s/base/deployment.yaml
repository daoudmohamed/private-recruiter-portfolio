apiVersion: apps/v1
kind: Deployment
metadata:
  name: mutuelle-rag-agent
  labels:
    app: mutuelle-rag-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mutuelle-rag-agent
  template:
    metadata:
      labels:
        app: mutuelle-rag-agent
    spec:
      serviceAccountName: mutuelle-rag-agent
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: mutuelle-rag-agent
          image: mutuelle-rag-agent:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mutuelle-secrets
                  key: openai-api-key
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: mutuelle-config
                  key: redis-host
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: mutuelle-config
                  key: redis-port
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mutuelle-secrets
                  key: redis-password
                  optional: true
            - name: QDRANT_HOST
              valueFrom:
                configMapKeyRef:
                  name: mutuelle-config
                  key: qdrant-host
            - name: QDRANT_GRPC_PORT
              valueFrom:
                configMapKeyRef:
                  name: mutuelle-config
                  key: qdrant-port
            - name: QDRANT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mutuelle-secrets
                  key: qdrant-api-key
                  optional: true
            - name: FRONTEND_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: mutuelle-config
                  key: frontend-base-url
            - name: FRONTEND_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: mutuelle-config
                  key: frontend-origin
            - name: DOCUMENTS_FOLDER
              valueFrom:
                configMapKeyRef:
                  name: mutuelle-config
                  key: documents-folder
            - name: RECRUITER_ACCESS_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: mutuelle-secrets
                  key: recruiter-access-token-secret
            - name: ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mutuelle-secrets
                  key: admin-api-key
            - name: RECRUITER_ACCESS_FROM_EMAIL
              valueFrom:
                configMapKeyRef:
                  name: mutuelle-config
                  key: recruiter-access-from-email
            - name: RECRUITER_ACCESS_FROM_NAME
              valueFrom:
                configMapKeyRef:
                  name: mutuelle-config
                  key: recruiter-access-from-name
            - name: RECRUITER_ACCESS_REPLY_TO
              valueFrom:
                configMapKeyRef:
                  name: mutuelle-config
                  key: recruiter-access-reply-to
            - name: RECRUITER_ACCESS_EMAIL_SUBJECT
              valueFrom:
                configMapKeyRef:
                  name: mutuelle-config
                  key: recruiter-access-email-subject
            - name: BREVO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mutuelle-secrets
                  key: brevo-api-key
            - name: BREVO_TEMPLATE_ID
              valueFrom:
                configMapKeyRef:
                  name: mutuelle-config
                  key: brevo-template-id
            - name: RECRUITER_ACCESS_CAPTCHA_PROVIDER
              valueFrom:
                configMapKeyRef:
                  name: mutuelle-config
                  key: recruiter-access-captcha-provider
            - name: RECRUITER_ACCESS_CAPTCHA_SITE_KEY
              valueFrom:
                configMapKeyRef:
                  name: mutuelle-config
                  key: recruiter-access-captcha-site-key
            - name: RECRUITER_ACCESS_CAPTCHA_RECAPTCHA_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: mutuelle-secrets
                  key: recruiter-access-captcha-recaptcha-secret-key
                  optional: true
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - mutuelle-rag-agent
                topologyKey: kubernetes.io/hostname
