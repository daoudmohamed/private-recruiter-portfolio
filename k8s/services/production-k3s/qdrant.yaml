apiVersion: v1
kind: Service
metadata:
  name: qdrant-prod
  namespace: mutuelle-production
  labels:
    app.kubernetes.io/name: qdrant-prod
spec:
  selector:
    app.kubernetes.io/name: qdrant-prod
  ports:
    - name: http
      port: 6333
      targetPort: 6333
    - name: grpc
      port: 6334
      targetPort: 6334
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qdrant-prod
  namespace: mutuelle-production
  labels:
    app.kubernetes.io/name: qdrant-prod
spec:
  serviceName: qdrant-prod
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: qdrant-prod
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qdrant-prod
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.16.2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6333
              name: http
            - containerPort: 6334
              name: grpc
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: qdrant-storage
              mountPath: /qdrant/storage
  volumeClaimTemplates:
    - metadata:
        name: qdrant-storage
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 8Gi
