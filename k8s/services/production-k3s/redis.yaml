apiVersion: v1
kind: Service
metadata:
  name: redis-prod
  namespace: mutuelle-production
  labels:
    app.kubernetes.io/name: redis-prod
spec:
  selector:
    app.kubernetes.io/name: redis-prod
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-prod
  namespace: mutuelle-production
  labels:
    app.kubernetes.io/name: redis-prod
spec:
  serviceName: redis-prod
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis-prod
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis-prod
    spec:
      containers:
        - name: redis
          image: redis:7.4-alpine
          imagePullPolicy: IfNotPresent
          args:
            - redis-server
            - --appendonly
            - "yes"
            - --save
            - "60"
            - "1"
            - --maxmemory
            - 192mb
            - --maxmemory-policy
            - allkeys-lru
          ports:
            - containerPort: 6379
              name: redis
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          volumeMounts:
            - name: redis-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi
