apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mutuelle-production

resources:
  - ../../base

nameSuffix: -prod

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: mutuelle-rag-agent

  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "1Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "4Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "2000m"
    target:
      kind: Deployment
      name: mutuelle-rag-agent

  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/maxReplicas
        value: 20
    target:
      kind: HorizontalPodAutoscaler
      name: mutuelle-rag-agent

  - patch: |-
      - op: replace
        path: /spec/minAvailable
        value: 2
    target:
      kind: PodDisruptionBudget
      name: mutuelle-rag-agent

  - patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: portfolio.example.com
      - op: replace
        path: /spec/tls/0/hosts/0
        value: portfolio.example.com
      - op: replace
        path: /spec/tls/0/secretName
        value: portfolio-example-com-tls
    target:
      kind: Ingress
      name: mutuelle-rag-agent

configMapGenerator:
  - name: mutuelle-config
    behavior: merge
    literals:
      - redis-host=redis-prod
      - qdrant-host=qdrant-prod
      - frontend-base-url=https://portfolio.example.com
      - frontend-origin=https://portfolio.example.com
      - recruiter-access-from-email=noreply@example.com
      - recruiter-access-reply-to=contact@example.com
