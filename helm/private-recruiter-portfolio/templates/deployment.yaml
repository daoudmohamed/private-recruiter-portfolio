apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "private-recruiter-portfolio.fullname" . }}
  labels:
    {{- include "private-recruiter-portfolio.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "private-recruiter-portfolio.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "private-recruiter-portfolio.selectorLabels" . | nindent 8 }}
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
    spec:
      serviceAccountName: {{ include "private-recruiter-portfolio.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: private-recruiter-portfolio
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: JAVA_TOOL_OPTIONS
              value: {{ .Values.jvm.javaToolOptions | quote }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecretName }}
                  key: openai-api-key
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "private-recruiter-portfolio.fullname" . }}-config
                  key: redis-host
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "private-recruiter-portfolio.fullname" . }}-config
                  key: redis-port
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecretName }}
                  key: redis-password
                  optional: true
            - name: QDRANT_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "private-recruiter-portfolio.fullname" . }}-config
                  key: qdrant-host
            - name: QDRANT_GRPC_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "private-recruiter-portfolio.fullname" . }}-config
                  key: qdrant-port
            - name: QDRANT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecretName }}
                  key: qdrant-api-key
                  optional: true
            - name: FRONTEND_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "private-recruiter-portfolio.fullname" . }}-config
                  key: frontend-base-url
            - name: FRONTEND_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: {{ include "private-recruiter-portfolio.fullname" . }}-config
                  key: frontend-origin
            - name: DOCUMENTS_FOLDER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "private-recruiter-portfolio.fullname" . }}-config
                  key: documents-folder
            - name: RECRUITER_ACCESS_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecretName }}
                  key: recruiter-access-token-secret
            - name: ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecretName }}
                  key: admin-api-key
            - name: RECRUITER_ACCESS_FROM_EMAIL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "private-recruiter-portfolio.fullname" . }}-config
                  key: recruiter-access-from-email
            - name: RECRUITER_ACCESS_FROM_NAME
              valueFrom:
                configMapKeyRef:
                  name: {{ include "private-recruiter-portfolio.fullname" . }}-config
                  key: recruiter-access-from-name
            - name: RECRUITER_ACCESS_REPLY_TO
              valueFrom:
                configMapKeyRef:
                  name: {{ include "private-recruiter-portfolio.fullname" . }}-config
                  key: recruiter-access-reply-to
            - name: RECRUITER_ACCESS_EMAIL_SUBJECT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "private-recruiter-portfolio.fullname" . }}-config
                  key: recruiter-access-email-subject
            - name: BREVO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecretName }}
                  key: brevo-api-key
            - name: BREVO_TEMPLATE_ID
              valueFrom:
                configMapKeyRef:
                  name: {{ include "private-recruiter-portfolio.fullname" . }}-config
                  key: brevo-template-id
            - name: RECRUITER_ACCESS_CAPTCHA_PROVIDER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "private-recruiter-portfolio.fullname" . }}-config
                  key: recruiter-access-captcha-provider
            - name: RECRUITER_ACCESS_CAPTCHA_SITE_KEY
              valueFrom:
                configMapKeyRef:
                  name: {{ include "private-recruiter-portfolio.fullname" . }}-config
                  key: recruiter-access-captcha-site-key
            - name: RECRUITER_ACCESS_CAPTCHA_RECAPTCHA_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecretName }}
                  key: recruiter-access-captcha-recaptcha-secret-key
                  optional: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: {{ .Values.management.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 24
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: {{ .Values.management.port }}
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: {{ .Values.management.port }}
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
