replicaCount: 1

image:
  repository: ghcr.io/daoudmohamed/private-recruiter-portfolio
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

management:
  port: 8080
  servicePort: 8080

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/path: /actuator/prometheus
  prometheus.io/port: "8080"

ingress:
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  host: portfolio.example.com
  tls:
    enabled: true
    secretName: portfolio-example-com-tls

resources:
  requests:
    memory: 384Mi
    cpu: 150m
  limits:
    memory: 1024Mi
    cpu: 750m

jvm:
  javaToolOptions: "-XX:MaxRAMPercentage=60 -XX:InitialRAMPercentage=25 -XX:+UseContainerSupport"

redis:
  host: redis-prod
  port: "6379"

qdrant:
  host: qdrant-prod
  grpcPort: "6334"

frontend:
  baseUrl: https://portfolio.example.com
  origin: https://portfolio.example.com

documents:
  folder: /app/documents

recruiterAccess:
  email:
    fromName: Knowledge Base
    fromEmail: noreply@example.com
    replyTo: contact@example.com
    subject: Votre acces recruteur
    brevoTemplateId: "1"
  captcha:
    provider: RECAPTCHA
    siteKey: ""

secrets:
  existingSecretName: mutuelle-secrets
