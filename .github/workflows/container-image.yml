name: Container Image

on:
  workflow_run:
    workflows:
      - CI
      - Security Analysis
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: image-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and Push Image
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check workflow prerequisites
        id: gate
        uses: actions/github-script@v8
        with:
          script: |
            if (context.eventName === 'workflow_dispatch') {
              core.setOutput('ready', 'true');
              return;
            }

            const headSha = context.payload.workflow_run.head_sha;
            const { owner, repo } = context.repo;
            const workflows = ['CI', 'Security Analysis'];

            const runs = await github.paginate(
              github.rest.actions.listWorkflowRunsForRepo,
              {
                owner,
                repo,
                head_sha: headSha,
                per_page: 100,
                status: 'completed'
              }
            );

            const conclusions = Object.fromEntries(
              workflows.map((name) => {
                const run = runs.find((candidate) => candidate.name === name);
                return [name, run?.conclusion ?? 'missing'];
              })
            );

            core.info(`Workflow conclusions for ${headSha}: ${JSON.stringify(conclusions)}`);
            core.setOutput(
              'ready',
              workflows.every((name) => conclusions[name] === 'success') ? 'true' : 'false'
            );

      - name: Checkout
        if: ${{ steps.gate.outputs.ready == 'true' }}
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        if: ${{ steps.gate.outputs.ready == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ steps.gate.outputs.ready == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        if: ${{ steps.gate.outputs.ready == 'true' }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        if: ${{ steps.gate.outputs.ready == 'true' }}
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Scan image with Trivy
        if: ${{ steps.gate.outputs.ready == 'true' }}
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          image-ref: ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload Trivy scan results
        if: ${{ always() && steps.gate.outputs.ready == 'true' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Attest build provenance
        if: ${{ steps.gate.outputs.ready == 'true' }}
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Skip build because prerequisites are not complete
        if: ${{ steps.gate.outputs.ready != 'true' }}
        run: echo "Skipping image build until both CI and Security Analysis succeed for this commit."
