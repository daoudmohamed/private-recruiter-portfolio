name: Container Image

on:
  workflow_run:
    workflows:
      - CI
      - Security Analysis
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TRIVY_VERSION: "0.65.0"

concurrency:
  group: image-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and Push Image
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check workflow prerequisites
        id: gate
        uses: actions/github-script@v8
        with:
          script: |
            if (context.eventName === 'workflow_dispatch') {
              core.setOutput('ready', 'true');
              return;
            }

            const headSha = context.payload.workflow_run.head_sha;
            const { owner, repo } = context.repo;
            const workflows = ['CI', 'Security Analysis'];

            const runs = await github.paginate(
              github.rest.actions.listWorkflowRunsForRepo,
              {
                owner,
                repo,
                head_sha: headSha,
                per_page: 100,
                status: 'completed'
              }
            );

            const latestRunFor = (name) => runs
              .filter((candidate) => candidate.name === name)
              .sort((a, b) => {
                const aTime = new Date(a.run_started_at ?? a.created_at ?? 0).getTime();
                const bTime = new Date(b.run_started_at ?? b.created_at ?? 0).getTime();
                return bTime - aTime;
              })[0];

            const conclusions = Object.fromEntries(
              workflows.map((name) => {
                const run = latestRunFor(name);
                return [name, run?.conclusion ?? 'missing'];
              })
            );

            core.info(`Workflow conclusions for ${headSha}: ${JSON.stringify(conclusions)}`);
            core.setOutput(
              'ready',
              workflows.every((name) => conclusions[name] === 'success') ? 'true' : 'false'
            );

      - name: Prepare image references
        if: ${{ steps.gate.outputs.ready == 'true' }}
        id: refs
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch || github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          IMAGE_REPOSITORY="ghcr.io/${GITHUB_REPOSITORY}"
          SHA_TAG="sha-${HEAD_SHA}"
          BRANCH_TAG="${HEAD_BRANCH//\//-}"
          SCAN_TAG="scan-${HEAD_SHA}"

          {
            echo "image_repository=${IMAGE_REPOSITORY}"
            echo "scan_tag=${SCAN_TAG}"
            echo "stable_tags<<EOF"
            echo "${IMAGE_REPOSITORY}:${BRANCH_TAG}"
            if [ "${HEAD_BRANCH}" = "${DEFAULT_BRANCH}" ]; then
              echo "${IMAGE_REPOSITORY}:latest"
            fi
            echo "${IMAGE_REPOSITORY}:${SHA_TAG}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: ${{ steps.gate.outputs.ready == 'true' }}
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        if: ${{ steps.gate.outputs.ready == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ steps.gate.outputs.ready == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        if: ${{ steps.gate.outputs.ready == 'true' }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.refs.outputs.image_repository }}

      - name: Build and push quarantine image
        if: ${{ steps.gate.outputs.ready == 'true' }}
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.refs.outputs.image_repository }}:${{ steps.refs.outputs.scan_tag }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Skip Trivy scan temporarily
        if: ${{ steps.gate.outputs.ready == 'true' }}
        run: echo "Trivy image scan is temporarily disabled."

      - name: Publish stable tags
        if: ${{ steps.gate.outputs.ready == 'true' }}
        run: |
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            docker buildx imagetools create \
              --tag "$tag" \
              "${{ steps.refs.outputs.image_repository }}@${{ steps.build.outputs.digest }}"
          done <<'EOF'
          ${{ steps.refs.outputs.stable_tags }}
          EOF

      - name: Attest build provenance
        if: ${{ steps.gate.outputs.ready == 'true' }}
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Skip build because prerequisites are not complete
        if: ${{ steps.gate.outputs.ready != 'true' }}
        run: echo "Skipping image build until both CI and Security Analysis succeed for this commit."
